<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#2d2b55"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Segmented gauge ring — three provider arcs -->
  <!-- Gemini (blue-violet) · top arc -->
  <path d="M 73.4 74.0 A 72 72 0 0 1 194.2 90.4"
        fill="none" stroke="#7b8cf7" stroke-width="19" stroke-linecap="round"/>

  <!-- GPT (teal) · right-bottom arc -->
  <path d="M 199.0 106.2 A 72 72 0 0 1 113.0 196.4"
        fill="none" stroke="#5cb8a5" stroke-width="19" stroke-linecap="round"/>

  <!-- Claude (coral) · left arc -->
  <path d="M 100.8 192.8 A 72 72 0 0 1 63.0 88.6"
        fill="none" stroke="#e8815c" stroke-width="19" stroke-linecap="round"/>

  <!-- Three ascending usage bars, color-keyed to provider arcs -->
  <rect x="103" y="148" width="14" height="20" rx="4" fill="#e8815c"/>
  <rect x="121" y="136" width="14" height="32" rx="4" fill="#5cb8a5"/>
  <rect x="139" y="124" width="14" height="44" rx="4" fill="#7b8cf7"/>

  <!-- Trend line connecting bar tops -->
  <path d="M110 148 L128 136 L146 124"
        fill="none" stroke="#ffffff" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.78"/>

  <!-- Accent dot at peak -->
  <circle cx="146" cy="124" r="4" fill="#ffffff" opacity="0.9"/>
</svg>
